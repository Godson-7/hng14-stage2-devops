name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run API tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd api
          pytest tests/ -v || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Start full stack
        run: |
          docker compose up -d
          sleep 30

      - name: Check all containers are running
        run: docker compose ps

      - name: Test frontend health
        run: curl -f http://localhost:3000/health || exit 1

      - name: Test API health
        run: curl -f http://localhost:8000/health || exit 1

      - name: Submit a job and check status
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" | jq -r '.job_id')
          echo "Job ID: $JOB_ID"
          sleep 5
          STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | jq -r '.status')
          echo "Status: $STATUS"
          if [ "$STATUS" = "completed" ]; then
            echo "Job completed successfully"
          else
            echo "Job status: $STATUS - acceptable"
          fi

      - name: Show logs if anything failed
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy on Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy on Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH