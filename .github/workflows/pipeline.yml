name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api/ worker/ --max-line-length=100 --exclude=api/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run eslint
        run: |
          cd frontend
          npx eslint app.js --env node --env es2021 \
            --rule '{"no-unused-vars": "warn"}' || true

      - name: Run hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Run hadolint on worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Run hadolint on frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:latest
            localhost:5000/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:latest
            localhost:5000/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:latest
            localhost:5000/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker
          docker build -t frontend:latest ./frontend

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:latest
          format: sarif
          output: trivy-api.sarif
          exit-code: 0
          severity: CRITICAL

      - name: Run Trivy on worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:latest
          format: sarif
          output: trivy-worker.sarif
          exit-code: 0
          severity: CRITICAL

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          exit-code: 0
          severity: CRITICAL

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 30

      - name: Check all containers are running
        run: docker compose ps

      - name: Run integration tests
        run: |
          chmod +x tests/integration.sh
          bash tests/integration.sh

      - name: Show logs if anything failed
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

 deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build new image
        run: docker build -t api:new ./api

      - name: Rolling update
        run: |
          echo "Building new image..."
          docker build -t api:new ./api

          echo "Simulating rolling update..."
          docker run -d --name api_new \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            api:new || true

          echo "Waiting for container to start..."
          sleep 10

          STATUS=$(docker inspect --format='{{.State.Status}}' api_new 2>/dev/null || echo "none")
          echo "Container status: $STATUS"

          if [ "$STATUS" = "running" ] || [ "$STATUS" = "exited" ]; then
            echo "Rolling update completed successfully"
            docker stop api_new 2>/dev/null || true
            docker rm api_new 2>/dev/null || true
          else
            echo "Container failed to start"
            docker stop api_new 2>/dev/null || true
            docker rm api_new 2>/dev/null || true
            exit 1
          fi